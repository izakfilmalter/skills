name: Validate skills

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v7
        with:
          python-version: "3.10"
      - run: npm ci
      - run: npm test
      - run: python3 skills/media/fathom-video/scripts/fathom_media.py --help
      - run: python3 skills/media/loom-video/scripts/loom_media.py --help
      - run: npx skills@latest add . --list --full-depth
      - run: npx --yes @anthropic-ai/claude-code@latest plugin validate . --strict
